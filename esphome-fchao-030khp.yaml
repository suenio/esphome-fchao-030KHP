substitutions:
  name: fchao_inverter
  device_description: "FCHAO 030KHP Inverter"
  cat1: "[DI]"
  cat2: "[PAR]"
  tx_pin: GPIO22
  rx_pin: GPIO21

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2026.4.0

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome    
    password: !secret ota_password

esp32:
  #board: wemos_d1_mini32
  board: esp32dev
  framework:
    type: esp-idf
 #   type: arduino
#esp32:
  #board: esp32-s3-devkitc-1
  #variant: ESP32S3
  #flash_size: 16MB
  #framework:
  #  type: arduino
#    version: 2.0.4
#  framework:
#    type: esp-idf
#    sdkconfig_options:
#      CONFIG_ESP32_S3_BOX_BOARD: "y"



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  #version: 3
  #auth:
  #  username: !secret web_server_username
  #  password: !secret web_server_password  

logger:
  level: DEBUG
  #3level: DEBUG
  
# Set pins required for LilyGo T-CAN485 board comment out if using different board
output:
  - platform: gpio
    id: ENABLE_PIN # Enable the chip
    pin:
      number: GPIO19
      inverted: true
  - platform: gpio
    id: SE_PIN # Enable autodirection
    pin:
      number: GPIO17
      inverted: true
  - platform: gpio
    id: ENABLE_5V_PIN # Enable 5V pin for RS485 chip
    pin:
      number: GPIO16
      inverted: true

# =========================
# UART / MODBUS
# =========================
uart:
  id: uart_modbus
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: 9600

modbus:
  id: modbus1
  uart_id: uart_modbus
  send_wait_time: 200ms

modbus_controller:
  - id: inverter_modbus
    address: 5
    modbus_id: modbus1
    update_interval: 30s
    #setup_priority: -10
    #command_throttle: 10ms
  
sensor:
# =========================
# ⚡ SYSTEM INFORMATION
# =========================
  - platform: modbus_controller
    modbus_controller_id: inverter_modbus
    id: ac_grid_voltage
    name: "${cat1} AC Grid Voltage"
    entity_category: DIAGNOSTIC
    address: 2002
    register_type: holding
    value_type: U_WORD
    state_class: measurement
    device_class: voltage
    unit_of_measurement: "V"
    filters: 
      - multiply: 0.1 

  - platform: modbus_controller
    modbus_controller_id: inverter_modbus
    id: ac_grid_frequency
