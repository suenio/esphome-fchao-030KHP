text_sensor:
# =========================
# 🌡 SYSTEM
# =========================
  
  - platform: modbus_controller  ##ok
    modbus_controller_id: inverter_modbus
    id: operating_mode
    name: "${cat1} Operating Mode"
    entity_category: DIAGNOSTIC
    address: 2001
    register_type: holding
    raw_encode: HEXBYTES
    lambda: |-
      uint16_t value = modbus::helpers::word_from_hex_str(x, 0);
      switch(value) {
        case 0: return {"Power On Mode"};
        case 1: return {"Standby Mode)"};
        case 2: return {"Mains Mode (On-grid)"};
        case 3: return {"Off-grid Mode"};
        case 4: return {"Bypass Mode"};
        case 5: return {"Charging Mode"};
        case 6: return {"Fault Mode"};
        default: {
          std::string newString = "Unknown";
          newString += " -> ";
          newString += x;
          return newString;
        }
      }

  
